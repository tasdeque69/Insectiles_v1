name: CI

on:
  push:
    branches: ["main", "dev", "work"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
